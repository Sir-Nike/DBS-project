{% extends 'base.html' %}
{% block title %}Login{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-card">

        <div class="auth-header">
            <div class="auth-logo">📋</div>
            <h1>CCE Quiz Portal</h1>
            <p>Manipal Institute of Technology</p>
        </div>

        <form method="POST" action="{{ url_for('auth.login') }}">
            <div class="form-group">
                <label for="login_id">Roll Number / Staff ID</label>
                <input type="text" id="login_id" name="login_id"
                       placeholder="e.g. 240953382 or CCE101"
                       required autocomplete="off">
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password"
                       placeholder="Enter your password" required>
            </div>

            <button type="submit" class="btn btn-primary btn-full">Login →</button>
        </form>

        <p class="auth-footer">
            Students login with roll number, teachers with staff ID.<br>
            Role is detected automatically.<br><br>
            New here? <a href="{{ url_for('auth.register') }}">Register</a>
        </p>

    </div>
</div>
{% endblock %}
