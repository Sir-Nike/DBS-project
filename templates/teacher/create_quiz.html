{% extends 'base.html' %}
{% block title %}Create Quiz{% endblock %}

{% block content %}
<div class="dashboard-header">
    <h2>Create New Quiz</h2>
    <p>Fill in the quiz details below</p>
</div>

<div class="card" style="max-width: 560px;">
    <form method="POST" action="{{ url_for('teacher.create_quiz') }}">

        <div class="form-group">
            <label for="quiz_title">Quiz Title</label>
            <input type="text" id="quiz_title" name="quiz_title"
                   placeholder="e.g. DBS Unit 2 Quiz" required>
        </div>

        <div class="form-group">
            <label for="subject_id">Subject</label>
            <select id="subject_id" name="subject_id" required>
                <option value="">-- Select Subject --</option>
                {% for s in subjects %}
                <option value="{{ s.subject_id }}">{{ s.subject_name }} ({{ s.subject_code }})</option>
                {% endfor %}
            </select>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
            <div class="form-group">
                <label for="duration_minutes">Duration (minutes)</label>
                <input type="number" id="duration_minutes" name="duration_minutes"
                       min="1" max="180" placeholder="15" required>
            </div>
            <div class="form-group">
                <label for="total_marks">Total Marks</label>
                <input type="number" id="total_marks" name="total_marks"
                       min="1" placeholder="10" required>
            </div>
        </div>

        <div class="form-group">
            <label for="quiz_date">Quiz Date</label>
            <input type="date" id="quiz_date" name="quiz_date" required>
        </div>

        <div style="display: flex; gap: 0.8rem;">
            <button type="submit" class="btn btn-primary">Create Quiz →</button>
            <a href="{{ url_for('teacher.dashboard') }}" class="btn btn-outline">Cancel</a>
        </div>

    </form>
</div>
{% endblock %}
